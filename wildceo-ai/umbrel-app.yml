description: >-
  WildCEO AI is a self-hosted strategic advisor built on the WildCEO manifesto philosophy.
  It doesn't give generic advice — it reframes your problem, finds the asymmetric angle,
  and hands you the move.


  BRING YOUR OWN KEY — Supports Anthropic (Claude), OpenAI (GPT), OpenRouter (200+ models),
  and Ollama (fully local, zero cloud). Your keys stay on your server.


  FOUR WAR ROOM MODES:

  ♟ STRATEGY — Asymmetric thinking for hard problems.

  ⚔ FIGHT — Legal, corporate, or competitive warfare.

  ⚡ BUILD — Startup, product, or team decisions.

  🔥 LEAD — People, family, values, culture.


  FEATURES:

  Full conversation history with persistence across restarts.
  Multi-provider LLM routing — switch models in seconds.
  Connection testing before you commit.
  Mobile responsive — use from your phone on LAN.
  Zero telemetry, zero tracking, zero cloud dependency.
  With Ollama: fully offline, no API keys, complete sovereignty.


  Your data stays on your machine. Always.
