<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070E1A"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E6007E"/>
      <stop offset="100%" stop-color="#9333EA"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#E6007E" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#E6007E" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="256" height="256" fill="url(#bg)"/>
  <!-- Glow -->
  <circle cx="128" cy="100" r="80" fill="url(#glow)"/>
  <!-- W letterform -->
  <text x="128" y="168" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="140" fill="url(#accent)">W</text>
  <!-- Bottom accent line -->
  <rect x="64" y="200" width="128" height="3" rx="1.5" fill="#E6007E" opacity="0.5"/>
  <!-- Subtitle -->
  <text x="128" y="228" text-anchor="middle" font-family="monospace" font-size="14" fill="#6B7C95" letter-spacing="4">AI</text>
</svg>
